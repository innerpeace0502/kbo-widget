name: Probe server

# Railway 서버 상태를 GitHub Actions 러너에서 점검하는 진단용 워크플로.
# (개발 세션의 네트워크 정책이 Railway 직접 호출을 막아 우회 수단으로 사용)
# probe.yml 자체가 바뀔 때 + 수동 실행(workflow_dispatch)으로만 돈다.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths: [".github/workflows/probe.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl API endpoints
        run: |
          B=https://web-production-6aae76.up.railway.app
          for ep in "/api/scores" "/api/relay" "/api/ranking" "/api/gameinfo?team=LG" "/api/pitcher/today" "/api/debug/scheduler"; do
            echo "========== GET $ep =========="
            curl -sS --max-time 60 -w "\n[HTTP %{http_code}, %{time_total}s]\n" "$B$ep" | head -c 4000
            echo
          done
          # Chromium 크래시 원인 직접 캡처 (버전·메모리 한도·stderr)
          echo "========== GET /api/debug/chrome =========="
          curl -sS --max-time 90 -w "\n[HTTP %{http_code}, %{time_total}s]\n" \
            "$B/api/debug/chrome" | head -c 6000

      - name: 올스타 브레이크 오인 진단
        run: |
          B=https://web-production-6aae76.up.railway.app
          echo "========== /api/schedule/today (올스타브레이크 필드 확인) =========="
          curl -sS --max-time 30 "$B/api/schedule/today" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          print('날짜:', d.get('날짜'), '/ 경기수:', d.get('경기수'))
          print('올스타브레이크:', d.get('올스타브레이크', '(없음 — 정상)'))
          print('내일경기:', d.get('내일경기'), '/ 다음경기:', d.get('다음경기'))
          for g in d.get('경기목록', [])[:5]:
              print(f\"  {g['away']} vs {g['home']} {g['time']} 시리즈={g.get('시리즈')!r}\")
          "
          echo "========== /api/schedule/today?team=KIA =========="
          curl -sS --max-time 30 "$B/api/schedule/today?team=KIA" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          print('올스타브레이크:', d.get('올스타브레이크', '(없음 — 정상)'))
          print(json.dumps(d.get('경기목록', []), ensure_ascii=False)[:300])
          "

      - name: 내일 선발투수 진단
        run: |
          B=https://web-production-6aae76.up.railway.app
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          TMR=$(TZ=Asia/Seoul date -d tomorrow +%Y%m%d)

          echo "========== KBO 원본: 내일($TMR) gamelist 선발 공시 여부 =========="
          curl -sS -X POST "https://www.koreabaseball.com/ws/Main.asmx/GetKboGameList" \
            -H "User-Agent: $UA" -H "Referer: https://www.koreabaseball.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "leId=1&srId=0,1,3,4,5,7,9&date=$TMR" -o /tmp/gl.json -w "[HTTP %{http_code}]\n"
          python3 - <<'PYEOF'
          import json
          for g in json.load(open('/tmp/gl.json')).get('game', []):
              print(f"{g.get('AWAY_NM')} vs {g.get('HOME_NM')}  선발: {g.get('T_PIT_P_NM')!r} / {g.get('B_PIT_P_NM')!r}  state={g.get('GAME_STATE_SC')}")
          PYEOF

          echo "========== 우리 서버 /api/pitcher/today =========="
          curl -sS --max-time 30 "$B/api/pitcher/today" | python3 -m json.tool --no-ensure-ascii
          echo "========== /api/pitcher/today?team=KIA =========="
          curl -sS --max-time 30 "$B/api/pitcher/today?team=KIA" | python3 -m json.tool --no-ensure-ascii
          echo "========== /api/gameinfo?team=KIA (앱 내 선발 표시용 — 홈팀 매칭) =========="
          curl -sS --max-time 30 "$B/api/gameinfo?team=KIA" | python3 -m json.tool --no-ensure-ascii
          echo "========== /api/gameinfo?team=한화 (원정팀 매칭) =========="
          curl -sS --max-time 30 "$B/api/gameinfo?team=%ED%95%9C%ED%99%94" | python3 -m json.tool --no-ensure-ascii
