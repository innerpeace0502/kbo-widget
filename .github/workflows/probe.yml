name: Probe server

# Railway 서버 상태를 GitHub Actions 러너에서 점검하는 진단용 워크플로.
# (개발 세션의 네트워크 정책이 Railway 직접 호출을 막아 우회 수단으로 사용)
# probe.yml 자체가 바뀔 때 + 수동 실행(workflow_dispatch)으로만 돈다.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths: [".github/workflows/probe.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl API endpoints
        run: |
          B=https://web-production-6aae76.up.railway.app
          for ep in "/api/scores" "/api/relay" "/api/ranking" "/api/gameinfo?team=LG" "/api/pitcher/today" "/api/debug/scheduler"; do
            echo "========== GET $ep =========="
            curl -sS --max-time 60 -w "\n[HTTP %{http_code}, %{time_total}s]\n" "$B$ep" | head -c 4000
            echo
          done
          # Chromium 크래시 원인 직접 캡처 (버전·메모리 한도·stderr)
          echo "========== GET /api/debug/chrome =========="
          curl -sS --max-time 90 -w "\n[HTTP %{http_code}, %{time_total}s]\n" \
            "$B/api/debug/chrome" | head -c 6000

      - name: 문자중계(relay) 데이터 소스 탐색
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          GID="20260707LGSS0"

          echo "========== ① GameCenter HTML에서 AJAX 엔드포인트 탐색 =========="
          curl -sS "https://www.koreabaseball.com/Schedule/GameCenter/Main.aspx?gameDate=20260707" \
            -H "User-Agent: $UA" -o /tmp/gc.html -w "[HTTP %{http_code}, %{size_download} bytes]\n"
          echo "-- .asmx/webservice 호출명 --"
          grep -oE '[A-Za-z0-9_./-]+\.asmx/[A-Za-z0-9_]+' /tmp/gc.html | sort -u | head -30
          echo "-- relay/livetext/sms 관련 문자열 --"
          grep -oiE '[a-z0-9_/.:-]*(relay|livetext|textrelay|sms)[a-z0-9_/.-]*' /tmp/gc.html | sort -u | head -30
          echo "-- JS 파일 목록 --"
          grep -oE 'src="[^"]+\.js[^"]*"' /tmp/gc.html | sort -u | head -20

          echo "========== ② KBO ws 후보 직접 타진 =========="
          for m in GetGameCenterRelay GetRelayList GetLiveText GetTextRelay; do
            echo "-- POST ws/Schedule.asmx/$m --"
            curl -sS -X POST "https://www.koreabaseball.com/ws/Schedule.asmx/$m" \
              -H "User-Agent: $UA" -H "Referer: https://www.koreabaseball.com/" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data "leId=1&srId=0&gameId=$GID&date=20260707" \
              -w "\n[HTTP %{http_code}]\n" --max-time 15 | head -c 600
            echo
          done

          echo "========== ③ 네이버 스포츠 API 후보 =========="
          NID="20260707LGSS02026"
          for u in \
            "https://api-gw.sports.naver.com/schedule/games/$NID" \
            "https://api-gw.sports.naver.com/schedule/games/$NID/relay?inningNo=7" \
            "https://api-gw.sports.naver.com/schedule/games/$NID/record" \
            "https://api-gw.sports.naver.com/game-center/games/$NID/relay"; do
            echo "-- GET $u --"
            curl -sS "$u" -H "User-Agent: $UA" -H "Referer: https://m.sports.naver.com/" \
              -w "\n[HTTP %{http_code}]\n" --max-time 15 | head -c 800
            echo
          done
