name: Probe server

# Railway 서버 상태를 GitHub Actions 러너에서 점검하는 진단용 워크플로.
# (개발 세션의 네트워크 정책이 Railway 직접 호출을 막아 우회 수단으로 사용)
# probe.yml 자체가 바뀔 때 + 수동 실행(workflow_dispatch)으로만 돈다.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths: [".github/workflows/probe.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl API endpoints
        run: |
          B=https://web-production-6aae76.up.railway.app
          for ep in "/api/scores" "/api/relay" "/api/ranking" "/api/gameinfo?team=LG" "/api/pitcher/today" "/api/debug/scheduler"; do
            echo "========== GET $ep =========="
            curl -sS --max-time 60 -w "\n[HTTP %{http_code}, %{time_total}s]\n" "$B$ep" | head -c 4000
            echo
          done
          # Chromium 크래시 원인 직접 캡처 (버전·메모리 한도·stderr)
          echo "========== GET /api/debug/chrome =========="
          curl -sS --max-time 90 -w "\n[HTTP %{http_code}, %{time_total}s]\n" \
            "$B/api/debug/chrome" | head -c 6000

      - name: 올스타전 데이터 조사
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          B=https://web-production-6aae76.up.railway.app

          echo "========== GetKboGameList (오늘=$TODAY, 올스타 포함 여부) =========="
          curl -sS -X POST "https://www.koreabaseball.com/ws/Main.asmx/GetKboGameList" \
            -H "User-Agent: $UA" -H "Referer: https://www.koreabaseball.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "leId=1&srId=0,1,3,4,5,7,9&date=$TODAY" -o /tmp/gl.json -w "[HTTP %{http_code}]\n"
          python3 - <<'PYEOF'
          import json
          games = json.load(open('/tmp/gl.json')).get('game', [])
          print(f"경기 수: {len(games)}")
          for g in games:
              keep = ['SR_ID','G_ID','AWAY_ID','HOME_ID','AWAY_NM','HOME_NM','S_NM','G_TM',
                      'GAME_STATE_SC','GAME_SC_ID','GAME_SC_NM','CANCEL_SC_ID','GAME_INN_NO',
                      'GAME_TB_SC_NM','T_SCORE_CN','B_SCORE_CN','TV_IF']
              print(json.dumps({k: g.get(k) for k in keep}, ensure_ascii=False))
          PYEOF

          echo "========== GetScheduleList (이번 달, 올스타/휴식기 표시) =========="
          curl -sS -X POST "https://www.koreabaseball.com/ws/Schedule.asmx/GetScheduleList" \
            -H "User-Agent: $UA" -H "Referer: https://www.koreabaseball.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "leId=1&srIdList=0,9&seasonId=2026&year=2026&month=07&gameMonth=07&teamId=" \
            -o /tmp/sch.json -w "[HTTP %{http_code}]\n"
          python3 - <<'PYEOF'
          import json, re
          def strip(t): return re.sub(r'<[^>]+>', '', t or '')
          rows = json.load(open('/tmp/sch.json')).get('rows', [])
          # 7/9~7/15 부근 행만 (올스타 주간)
          cur_day = ''
          for ro in rows:
              cells = [strip(c.get('Text','')) for c in ro.get('row', [])]
              cells = [c for c in cells if c]
              line = ' | '.join(cells)
              m = re.match(r'(07\.(09|10|11|12|13|14|15))', line)
              if m or any(k in line for k in ('올스타', '나눔', '드림')):
                  print(line[:160])
          PYEOF

          echo "========== 우리 서버가 오늘을 어떻게 주는지 =========="
          for ep in "/api/schedule/today" "/api/schedule/today?team=LG" "/api/scores"; do
            echo "-- GET $ep --"
            curl -sS --max-time 30 "$B$ep" -w "\n[HTTP %{http_code}]\n" | head -c 1500
            echo
          done
