name: Probe server

# Railway 서버 상태를 GitHub Actions 러너에서 점검하는 진단용 워크플로.
# (개발 세션의 네트워크 정책이 Railway 직접 호출을 막아 우회 수단으로 사용)
# probe.yml 자체가 바뀔 때 + 수동 실행(workflow_dispatch)으로만 돈다.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths: [".github/workflows/probe.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl API endpoints
        run: |
          B=https://web-production-6aae76.up.railway.app
          for ep in "/api/scores" "/api/relay" "/api/debug/scheduler" "/api/debug/scores"; do
            echo "========== GET $ep =========="
            curl -sS --max-time 60 -w "\n[HTTP %{http_code}, %{time_total}s]\n" "$B$ep" | head -c 4000
            echo
          done
          # Selenium 자체가 살아있는지 판별: 500이면 드라이버 고장, 200이면 페이지 구조 문제
          echo "========== GET /api/debug/fetch (GameCenter) =========="
          curl -sS -G --max-time 90 -w "\n[HTTP %{http_code}, %{time_total}s]\n" \
            "$B/api/debug/fetch" \
            --data-urlencode "url=https://www.koreabaseball.com/Schedule/GameCenter/Main.aspx?gameDate=20260707" \
            --data-urlencode "wait=4" | head -c 6000
